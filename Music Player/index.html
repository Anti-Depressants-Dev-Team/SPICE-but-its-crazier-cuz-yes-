<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium music streaming experience. Discover, stream, and enjoy millions of songs.">
  <title>Flowbeat — Music Streaming</title>
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <div class="app" id="app">

    <!-- ═══ Sidebar ═══ -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="sidebar__logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55C7.79 13 6 14.79 6 17s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <span class="sidebar__logo-text">Flowbeat</span>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav">
        <button class="sidebar__nav-item active" data-page="home" id="nav-home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="sidebar__nav-label">Home</span>
        </button>
        <button class="sidebar__nav-item" data-page="search" id="nav-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="sidebar__nav-label">Search</span>
        </button>
        <button class="sidebar__nav-item" data-page="library" id="nav-library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span class="sidebar__nav-label">Library</span>
        </button>
      </nav>

      <div class="sidebar__divider"></div>
      <div class="sidebar__section-title">Your Playlists</div>

      <div class="sidebar__playlists" id="sidebar-playlists">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- ═══ Main Content ═══ -->
    <main class="main" id="main">
      <div class="main__content" id="main-content">
        <!-- Populated by JS router -->
      </div>
    </main>

    <!-- ═══ Now Playing Bar ═══ -->
    <div class="now-playing" id="now-playing">

      <!-- Left: Playback Controls -->
      <div class="now-playing__left-controls">
        <button class="now-playing__btn" id="np-prev" aria-label="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="now-playing__btn now-playing__btn--play" id="np-play" aria-label="Play">
          <svg viewBox="0 0 24 24" fill="currentColor" id="np-play-icon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="now-playing__btn" id="np-next" aria-label="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
        <button class="now-playing__like" id="np-like" aria-label="Like">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
        <button class="now-playing__btn" id="np-queue" aria-label="Queue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>

      <!-- Song Info -->
      <div class="now-playing__song" id="np-song">
        <img class="now-playing__art" id="np-art" src="assets/album_synthwave.png" alt="Now playing album art">
        <div class="now-playing__info">
          <span class="now-playing__title" id="np-title">Neon Dreams</span>
          <span class="now-playing__artist" id="np-artist">Synthwave Collective</span>
        </div>
        <div class="now-playing__waveform" id="np-waveform">
          <div class="now-playing__waveform-bar"></div>
          <div class="now-playing__waveform-bar"></div>
          <div class="now-playing__waveform-bar"></div>
          <div class="now-playing__waveform-bar"></div>
          <div class="now-playing__waveform-bar"></div>
        </div>
      </div>

      <!-- Seek Bar (fills remaining space) -->
      <div class="now-playing__seek">
        <span id="np-current-time">0:00</span>
        <div class="now-playing__seek-track" id="np-time-bar">
          <div class="now-playing__progress-fill" id="np-time-fill" style="width:0%"></div>
        </div>
        <span id="np-total-time">3:45</span>
      </div>

      <!-- Right: Volume & Close -->
      <div class="now-playing__right-controls">
        <div class="now-playing__volume">
          <button class="now-playing__volume-btn" id="np-vol-btn" aria-label="Volume">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          </button>
          <input type="range" class="now-playing__volume-slider" id="np-volume" min="0" max="100" value="70" aria-label="Volume">
        </div>
        <button class="now-playing__extra-btn" id="np-fullscreen" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <!-- Hidden: Shuffle & Repeat (still functional via keyboard) -->
      <div class="now-playing__hidden">
        <button id="np-shuffle"></button>
        <button id="np-repeat"></button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
